apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: log
        enabled: true
        paths:
          - /var/log/bart-service/*.log
        json.keys_under_root: true
        json.add_error_key: true

    output.logstash:
      hosts: ["logstash:5044"]
