apiVersion: apps/v1
kind: Deployment
metadata:
  name: bart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bart-service
  template:
    metadata:
      labels:
        app: bart-service
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: bart-service
          image: bart-service:latest
          imagePullPolicy: Never   # use local minikube image, don't pull from Docker Hub
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bart-service
spec:
  selector:
    app: bart-service
  type: NodePort         # exposes it so we can curl from outside the cluster
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
