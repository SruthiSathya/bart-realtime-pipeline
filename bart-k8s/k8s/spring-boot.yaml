apiVersion: apps/v1
kind: Deployment
metadata:
  name: bart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bart-service
  template:
    metadata:
      labels:
        app: bart-service
    spec:
      containers:
        - name: bart-service
          image: bart-service:latest
          imagePullPolicy: Never   # use local minikube image, don't pull from Docker Hub
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: bart-service
spec:
  selector:
    app: bart-service
  type: NodePort         # exposes it so we can curl from outside the cluster
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
