apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-cli
  template:
    metadata:
      labels:
        app: python-cli
    spec:
      initContainers:
        - name: wait-for-bart-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z bart-service 8080; do echo waiting for bart-service; sleep 2; done']
      containers:
        - name: python-cli
          image: bart-python-cli:latest
          imagePullPolicy: Never   # use local minikube image
          env:
            - name: SPRING_BOOT_URL
              value: "http://bart-service:8080/api/bart/events"
