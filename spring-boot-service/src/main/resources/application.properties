# Server config
server.port=8080
spring.application.name=bart-service

# Show cleaner logs — INFO level means we see our log.info() calls
logging.level.com.bart=INFO

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
bart.kafka.topic=bart-events

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka Consumer
spring.kafka.consumer.group-id=bart-consumer-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# OpenTelemetry
otel.service.name=bart-service
otel.exporter.otlp.endpoint=http://otel-collector:4317
otel.traces.exporter=otlp
otel.metrics.exporter=none

# Expose Prometheus metrics endpoint
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true

logging.config=classpath:log4j2.xml